name: Bug Report
description: Laporkan bug agar dapat direproduksi dan diperbaiki.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Terima kasih sudah melaporkan bug. Mohon isi detail berikut agar investigasi lebih cepat.

  - type: textarea
    id: summary
    attributes:
      label: Ringkasan Bug
      description: Jelaskan masalah secara singkat.
      placeholder: Apa yang terjadi?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Langkah Reproduksi
      description: Berikan langkah yang jelas dan berurutan.
      placeholder: |
        1. Buka ...
        2. Klik ...
        3. Lihat error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Hasil yang Diharapkan
      placeholder: Seharusnya bagaimana?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Hasil Aktual
      placeholder: Apa yang benar-benar terjadi?
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Contoh: OS, Browser, Node.js, Wrangler
      placeholder: Windows 11, Chrome 135, Node 20, Wrangler 4.x

  - type: textarea
    id: logs
    attributes:
      label: Log / Screenshot
      description: Lampirkan log error atau screenshot jika ada.
      render: shell
