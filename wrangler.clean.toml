name = "crot-mail"
main = "src/index.js"
compatibility_date = "2024-01-01"
workers_dev = true

# Uncomment and adjust when using custom domain route in production.
# [[routes]]
# pattern = "your-domain.com/*"
# zone_name = "your-domain.com"

[assets]
directory = "public"
binding = "ASSETS"

[triggers]
crons = ["*/5 * * * *"]

[vars]
MAIL_DOMAINS = "mail1.example.com,mail2.example.com"
EXPIRE_MINUTES = "43200"
MESSAGE_RETENTION_DAYS = "1"

# OPTIONAL:
# If you want to protect mailbox creation/admin endpoints, set ACCESS_KEY as a secret:
# npx wrangler secret put ACCESS_KEY --config wrangler.clean.toml
#
# Optional custom JWT secret:
# npx wrangler secret put JWT_SECRET --config wrangler.clean.toml
